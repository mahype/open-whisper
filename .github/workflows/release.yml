name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build, sign, notarize, publish
    runs-on: macos-14
    timeout-minutes: 90
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16 (Swift 6)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          cargo_ver="$(awk -F'"' '/^version/ {print $2; exit}' Cargo.toml)"
          if [[ "$tag" != "$cargo_ver" ]]; then
            echo "error: tag $tag does not match Cargo.toml version $cargo_ver" >&2
            exit 1
          fi
          echo "Tag / Cargo version match: $tag"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Import signing certificate
        env:
          CERT_B64: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          CERT_PW: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          keychain="$RUNNER_TEMP/build.keychain"
          kpw="$(openssl rand -base64 24)"
          cert_path="$RUNNER_TEMP/cert.p12"

          security create-keychain -p "$kpw" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$kpw" "$keychain"

          printf '%s' "$CERT_B64" | base64 --decode > "$cert_path"
          security import "$cert_path" -k "$keychain" \
              -P "$CERT_PW" \
              -T /usr/bin/codesign -T /usr/bin/security
          rm -f "$cert_path"

          # Prepend our keychain to the user search list so codesign can find the
          # identity — without clobbering the runner's default keychains.
          existing="$(security list-keychains -d user | xargs)"
          security list-keychains -d user -s "$keychain" $existing

          security set-key-partition-list \
              -S apple-tool:,apple:,codesign: \
              -s -k "$kpw" "$keychain"

          identity="$(security find-identity -v -p codesigning "$keychain" \
              | awk -F'"' '/Developer ID Application/ {print $2; exit}')"
          if [[ -z "$identity" ]]; then
            echo "error: no Developer ID Application identity found in imported keychain" >&2
            security find-identity -v -p codesigning "$keychain" >&2 || true
            exit 1
          fi
          echo "Using signing identity: $identity"
          echo "MACOS_SIGN_IDENTITY=$identity" >> "$GITHUB_ENV"

      - name: Build universal .app
        run: ./scripts/build-macos-app.sh

      - name: Sign and notarize .app
        run: ./scripts/codesign-macos.sh

      - name: Build DMG
        run: ./scripts/build-dmg.sh

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/OpenWhisper-*.dmg
            dist/SHA256SUMS.txt

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain" || true
