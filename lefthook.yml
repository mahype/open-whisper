pre-commit:
  parallel: true
  commands:
    rustfmt:
      glob: "*.rs"
      run: cargo fmt --check -- {staged_files}
    swiftlint:
      glob: "apps/open-whisper-macos/Sources/**/*.swift"
      run: swiftlint lint --quiet --strict {staged_files}
      skip:
        - merge
        - rebase
    swift-format:
      glob: "apps/open-whisper-macos/Sources/**/*.swift"
      run: swift format lint {staged_files}
      skip:
        - merge
        - rebase
