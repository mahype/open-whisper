included:
  - apps/open-whisper-macos/Sources

excluded:
  - apps/open-whisper-macos/.build
  - apps/open-whisper-macos/Tests
  - target
  - dist

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length: 2
  excluded:
    - id
    - ok
    - to

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 60

function_body_length:
  warning: 80
  error: 150

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 800
  error: 1200
  ignore_comment_only_lines: true

cyclomatic_complexity:
  warning: 15
  error: 25

nesting:
  type_level:
    warning: 2

disabled_rules:
  - todo
  - trailing_comma

opt_in_rules:
  - closure_spacing
  - empty_count
  - empty_string
  - explicit_init
  - first_where
  - force_unwrapping
  - implicit_return
  - last_where
  - literal_expression_end_indentation
  - operator_usage_whitespace
  - redundant_nil_coalescing
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
