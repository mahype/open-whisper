included:
  - apps/open-whisper-macos/Sources

excluded:
  - apps/open-whisper-macos/.build
  - apps/open-whisper-macos/Tests
  - target
  - dist

# NOTE: This is the first-pass config — thresholds are deliberately loose so
# the existing sources lint cleanly. Tighten the numbers (and flip rules back
# to their defaults) once the sources have been refactored. See docs/CI.md
# §"Strictness roadmap".

line_length:
  warning: 200
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length:
    warning: 1
  max_length:
    warning: 60
  excluded:
    - id
    - ok
    - to
    - L
    - largeV3TurboQ5_0

type_name:
  min_length: 3
  max_length:
    warning: 50

function_body_length:
  warning: 120

type_body_length:
  warning: 900

file_length:
  warning: 1200
  ignore_comment_only_lines: true

cyclomatic_complexity:
  warning: 20

nesting:
  type_level:
    warning: 2

function_parameter_count:
  warning: 8

disabled_rules:
  - todo
  - trailing_comma

opt_in_rules:
  - closure_spacing
  - empty_count
  - empty_string
  - explicit_init
  - first_where
  - implicit_return
  - last_where
  - literal_expression_end_indentation
  - operator_usage_whitespace
  - redundant_nil_coalescing
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
